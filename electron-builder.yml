appId: store.smudgy.client
productName: Smudgy Client
directories:
  output: "build"
npmRebuild: false
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  icon: "src/assets/img/icon.png"
  artifactName: "${name}-${version}.${ext}"
mac:
  target: dmg
  icon: "src/assets/img/icon.icns"
  artifactName: "${name}-${version}.${ext}"
linux:
  target:
    - AppImage
    - tar.gz
  category: Game
  icon: "src/assets/img/icon.png"
  artifactName: "${name}-${version}.${ext}"
publish:
  - provider: github
    owner: OBS-Akuma
    repo: smudgy-client
    releaseType: release
