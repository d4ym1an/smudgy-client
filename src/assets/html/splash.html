<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smudgy Client</title>
  <style>
    @font-face {
      font-family: "Kanit";
      src: url("../Kanit-Regular.ttf") format("truetype");
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 600px;
      height: 300px;
      color: white;
      text-shadow: 0 0 0.5rem black;
      font-family: "Kanit", sans-serif;
      -webkit-app-region: drag;
    }

    .splash {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: url("../img/Froke_banner.webp") no-repeat center center / cover;
      border-radius: 1.5rem;
      padding: 0.75rem 1rem;
      box-sizing: border-box;
      position: relative;
    }

    .border {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0.25rem solid rgb(255, 255, 255, 0.25);
      border-radius: 1.5rem;
      box-sizing: pointer-events: none;
    }

    .dyk-text {
      font-size: 0.9rem;
      margin-top: 10px;
      max-width: 100%;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="status"></div>
    <div class="ver"></div>
  </div>
  <div class="border"></div>

  <script>
    const splash = document.querySelector('.splash');
    const statusDiv = document.querySelector('.status');
    const verDiv = document.querySelector('.ver');
    
    // Setup layout
    splash.style.display = 'flex';
    splash.style.flexDirection = 'column';
    splash.style.justifyContent = 'space-between';
    splash.style.alignItems = 'flex-start';
    splash.insertBefore(statusDiv, splash.firstChild);
    
    verDiv.style.alignSelf = 'flex-end';
    
    // Create container for DYK text
    const dykContainer = document.createElement('div');
    dykContainer.className = 'dyk-text';
    dykContainer.textContent = 'Loading fact...';
    splash.appendChild(dykContainer);
    
    // Fetch the API data
    fetch('https://raw.githubusercontent.com/OBS-Akuma/smudgy-client/refs/heads/main/Api/dyk.json')
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        return response.json();
      })
      .then(data => {
        console.log('API Data:', data);
        
        // Handle the data structure
        let facts = [];
        
        if (Array.isArray(data) && data.length > 0) {
          // Get all values from the first object
          facts = Object.values(data[0]);
        } else if (typeof data === 'object' && data !== null) {
          // If it's a single object
          facts = Object.values(data);
        }
        
        if (facts.length > 0) {
          const randomFact = facts[Math.floor(Math.random() * facts.length)];
          dykContainer.textContent = randomFact;
        } else {
          dykContainer.textContent = 'No facts available';
        }
      })
      .catch(error => {
        console.error('Fetch error:', error);
        dykContainer.textContent = 'Failed to load fact. Check console.';
        dykContainer.style.color = '#ffaaaa';
      });
  </script>
</body>
</html>
